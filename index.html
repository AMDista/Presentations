<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apresentações</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .folders {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .folder {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .folder:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            background: #f8f9ff;
        }

        .folder-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
            text-transform: capitalize;
        }

        .folder-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        a {
            color: #764ba2;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: inline-block;
            font-size: 14px;
        }

        a:hover {
            background: #f0f0f0;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Apresentações</h1>

        <div class="folders">
            <div class="folder">
                <div class="folder-title">🎼 Modelos Computacionais IA Partituras</div>
                <div class="folder-links">
                    <a href="./modelos_computacionais_ia_partituras/index.html">→ Apresentação</a>
                </div>
            </div>

            <div class="folder">
                <div class="folder-title">🛠️ O Paradigma das Ferramentas</div>
                <div class="folder-links">
                    <a href="./o_paradigma_das_ferramentas/index.html">→ Apresentação</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
