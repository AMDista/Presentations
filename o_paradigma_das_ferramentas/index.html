<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Paradigma das Ferramentas — Literacia Digital em IA</title>
<style>
/* ═══════════════════════════════════════════════════════════
   MIGUEL ALVES — PRESENTATION BASE TEMPLATE
   Palette: dark bg · blue-violet accent · grey text
   Resolution reference: 1920×1080 (16:9, scalable)
   ═══════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0c0c10;
  --surface:     #13131a;
  --border:      #252530;
  --accent:      #7B9CE0;      /* cornflower blue */
  --accent-dim:  #3D5590;      /* deep indigo */
  --accent-glow: rgba(123,156,224,0.12);
  --text:        #e4e2ec;
  --text-muted:  #8080a0;
  --text-dim:    #484860;
  --slide-w:     1920px;
  --slide-h:     1080px;
  --font-scale:  1;
  --base-size:   16px;
}
@media (max-width: 1366px), (max-height: 768px) {
  :root {
    --slide-w: 1280px;
    --slide-h: 720px;
  }
}
html {
  font-size: var(--base-size);
}

/* ── Light mode overrides ────────────────────────────────── */
[data-theme="light"] {
  --bg:          #edeef8;
  --surface:     #f4f4fc;
  --border:      #c4c4dc;
  --accent:      #4A6BC0;      /* deeper blue — legível em fundo claro */
  --accent-dim:  #8BA4D8;
  --accent-glow: rgba(74,107,192,0.10);
  --text:        #12122a;
  --text-muted:  #484868;
  --text-dim:    #9090b0;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow: hidden;
  color: var(--text);
  transition: background-color 350ms ease, color 350ms ease;
}

/* Propagar transição de tema a todos os elementos relevantes */
.slide, .slide-header, .slide-footer, .point-text, .ref-text,
.cover-title, .cover-subtitle, .cover-eyebrow, .cover-author,
#counter, #progress-bar, #overview, #notes-panel, #help-panel,
.help-inner, .notes-inner, .ov-thumb {
  transition:
    background-color 350ms ease,
    color 350ms ease,
    border-color 350ms ease,
    opacity 350ms cubic-bezier(0.4,0,0.2,1),
    transform 350ms cubic-bezier(0.4,0,0.2,1);
}

/* ── Viewport Scaler ─────────────────────────────────────── */
#scaler {
  position: fixed; inset: 0;
  background: var(--bg);
  overflow: hidden;
}
#stage {
  position: absolute;
  top: 50%; left: 50%;
  width: var(--slide-w); height: var(--slide-h);
  transform-origin: center center;
  /* transform definido pelo JS: translate(-50%,-50%) scale(s) */
}

/* ── Slide Base ──────────────────────────────────────────── */
.slide {
  position: absolute; inset: 0;
  padding: 80px 96px 120px;
  display: flex; flex-direction: column;
  justify-content: center;
  min-height: 100%;
  background: var(--surface);
  opacity: 0; pointer-events: none;
  transform: translateY(20px);
  transition:
    opacity 350ms cubic-bezier(0.4,0,0.2,1),
    transform 350ms cubic-bezier(0.4,0,0.2,1);
}
.slide.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
.slide.leaving { opacity: 0; transform: translateY(-20px); pointer-events: none; }

/* ── Cover Slide ─────────────────────────────────────────── */
.slide-cover {
  align-items: center; justify-content: center; text-align: center;
  background: var(--bg); padding: 0;
}
.slide-cover .cover-inner {
  display: flex; flex-direction: column; align-items: center;
  gap: 40px; max-width: 80%; position: relative; z-index: 2;
}
.cover-eyebrow {
  font-family: 'Arial', sans-serif;
  font-size: calc(1.375rem * var(--font-scale)); letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--accent); font-weight: 400;
}
.cover-title {
  font-size: calc(4.5rem * var(--font-scale)); font-weight: 400;
  line-height: 1.15; color: var(--text); letter-spacing: -0.01em;
}
.cover-title .accent { color: var(--accent); }
.cover-subtitle {
  font-family: 'Arial', sans-serif;
  font-size: calc(1.625rem * var(--font-scale)); color: var(--text-muted); font-weight: 300; letter-spacing: 0.05em;
}
.cover-divider { width: 60px; height: 2px; background: var(--accent); }
.cover-author {
  font-family: 'Arial', sans-serif;
  font-size: calc(1.375rem * var(--font-scale)); color: var(--text-muted); font-style: italic;
}
.cover-photo {
  position: absolute; right: 0; top: 0; bottom: 0; width: 38%;
  object-fit: cover; object-position: center top;
  opacity: 0.25;
  mask-image: linear-gradient(to left, rgba(0,0,0,0.5) 0%, transparent 100%);
  -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.5) 0%, transparent 100%);
}

/* ── Content Slide Header ────────────────────────────────── */
.slide-header {
  margin-bottom: 64px; padding-bottom: 28px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: baseline; gap: 28px;
}
.slide-number {
  font-family: 'Arial', sans-serif;
  font-size: calc(1.125rem * var(--font-scale)); color: var(--accent); font-weight: 700; letter-spacing: 0.1em; flex-shrink: 0;
}
.slide-title {
  font-size: calc(3.25rem * var(--font-scale)); font-weight: 400;
  color: var(--text); line-height: 1.15; letter-spacing: -0.01em;
}
.slide-title .accent { color: var(--accent); }

/* ── Points ──────────────────────────────────────────────── */
.points { list-style: none; display: flex; flex-direction: column; gap: 24px; flex: 1; justify-content: center; }
.point {
  display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: start; width: 100%;
  opacity: 0; transform: translateX(-12px);
  transition:
    opacity 400ms cubic-bezier(0.4,0,0.2,1),
    transform 400ms cubic-bezier(0.4,0,0.2,1);
}
.point.visible { opacity: 1; transform: translateX(0); }
.point-marker {
  width: 10px; height: 10px; background: var(--accent); border-radius: 50%;
  margin-top: 12px; flex-shrink: 0;
}
.point-content { display: flex; flex-direction: column; gap: 4px; }
.point-text { font-size: calc(1.625rem * var(--font-scale)); line-height: 1.45; color: var(--text); }
.point-text strong { color: var(--accent); font-weight: 600; }
.point-text .cite { font-family: 'Arial', sans-serif; font-size: 0.72em; color: var(--text-dim); }
.point-sub {
  font-family: 'Arial', sans-serif;
  font-size: calc(1.625rem * var(--font-scale)); color: var(--text-muted); line-height: 1.45;
  padding-left: 26px;
  position: relative;
}
.point-sub::before {
  content: '–';
  position: absolute;
  left: 8px;
  color: var(--accent-dim);
}
.point-subs {
  display: flex; flex-direction: column; gap: 4px;
  margin-top: 4px;
}

/* ── Two-column layout ───────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; flex: 1; }
.two-col-img { display: grid; grid-template-columns: 3fr 1fr; gap: 60px; flex: 1; }
.two-col-img .col-img-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; }
.two-col-img .col-img { width: 100%; max-height: 500px; object-fit: contain; border-radius: 4px; border: 1px solid var(--border); }
.two-col-img .col-img-label { font-family: 'Arial', sans-serif; font-size: calc(0.75rem * var(--font-scale)); color: var(--text-dim); text-align: center; margin-top: 8px; }
.col-block { display: flex; flex-direction: column; gap: 32px; }
.col-label {
  font-family: 'Arial', sans-serif;   font-size: calc(1.125rem * var(--font-scale));
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent);
  padding-bottom: 12px; border-bottom: 1px solid var(--accent-dim);
}

/* ── Quote / Highlight Slide ─────────────────────────────── */
.slide-quote { align-items: center; justify-content: center; text-align: center; }
.quote-text {
  font-size: calc(2.625rem * var(--font-scale)); line-height: 1.6; max-width: 75%;
  color: var(--text); font-style: italic;
}
.quote-source {
  margin-top: calc(3rem * var(--font-scale)); font-family: 'Arial', sans-serif;
  font-size: calc(1.375rem * var(--font-scale)); color: var(--text-muted);
}

/* ── References Slide ────────────────────────────────────── */
.refs-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px 60px; flex: 1; align-content: start;
}
/* Dense variant: 3 colunas, fonte mais pequena — para muitas referências */
.refs-grid-dense {
   display: grid; grid-template-columns: 1fr 1fr 1fr;
   gap: 14px 40px; flex: 1; align-content: start;
}
/* Compact variant: 3 colunas, fonte mínima — para 31-50 referências */
.refs-grid-compact {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px 28px; flex: 1; align-content: start;
}
.ref-item {
  display: grid; grid-template-columns: 14px 1fr; gap: 10px; align-items: start;
  opacity: 0; transform: translateX(-8px);
  transition:
    opacity 400ms cubic-bezier(0.4,0,0.2,1),
    transform 400ms cubic-bezier(0.4,0,0.2,1);
}
.ref-item.visible { opacity: 1; transform: translateX(0); }
.ref-dot { width: 5px; height: 5px; background: var(--accent-dim); border-radius: 50%; margin-top: 8px; flex-shrink: 0; }
.refs-grid    .ref-text { font-family: 'Arial', sans-serif; font-size: calc(1.1875rem * var(--font-scale)); color: var(--text-muted); line-height: 1.4; }
.refs-grid-dense .ref-text { font-family: 'Arial', sans-serif; font-size: calc(0.9375rem * var(--font-scale)); color: var(--text-muted); line-height: 1.35; }
.refs-grid-compact .ref-text { font-family: 'Arial', sans-serif; font-size: calc(0.75rem * var(--font-scale)); color: var(--text-muted); line-height: 1.3; }
.ref-text em { color: var(--text-dim); font-style: italic; }

/* ── Footer ──────────────────────────────────────────────── */
.slide-footer {
  position: absolute; bottom: 40px; left: 96px; right: 96px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid var(--border); padding-top: 16px;
  margin-top: auto;
}
.footer-left {
  font-family: 'Arial', sans-serif; font-size: calc(1.125rem * var(--font-scale));
  color: var(--text-dim); letter-spacing: 0.05em;
}
.footer-right { text-align: right; line-height: 1.3; }
.footer-author {
  font-family: 'Georgia', serif; font-style: italic;
  font-size: calc(1.25rem * var(--font-scale)); color: var(--text-muted);
}
.footer-date { font-family: 'Arial', sans-serif; font-size: calc(1rem * var(--font-scale)); color: var(--text-dim); }

/* ── Progress Bar ────────────────────────────────────────── */
#progress-bar {
  position: fixed; bottom: 0; left: 0; height: 3px;
  background: var(--accent);
  transition: width 300ms cubic-bezier(0.4,0,0.2,1);
  z-index: 100;
}

#zoom-indicator {
  position: fixed; bottom: 8px; left: 12px;
  font-family: 'Arial', sans-serif; font-size: 12px;
  color: var(--text-dim); z-index: 100;
  opacity: 0.7; transition: opacity 200ms ease;
}
#zoom-indicator.visible {
  opacity: 1;
}

/* ── Counter / Slide Menu ────────────────────────────────── */
#counter {
  position: fixed; top: 22px; right: 80px;
  font-family: 'Arial', sans-serif; font-size: 18px;
  color: var(--text-dim); letter-spacing: 0.1em; z-index: 100;
  cursor: pointer; user-select: none;
  padding: 4px 11px;
  border: 1px solid var(--border);
  border-radius: 6px;
  transition: border-color 200ms ease, color 200ms ease;
}
#counter:hover { border-color: var(--accent-dim); color: var(--text-muted); }
#slide-menu {
  position: fixed; top: 56px; right: 70px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; z-index: 160;
  display: none; min-width: 280px; max-height: 420px; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.45);
}
#slide-menu.open { display: block; }
.menu-item {
  display: flex; align-items: baseline; gap: 14px;
  padding: 10px 16px; cursor: pointer;
  font-family: 'Arial', sans-serif; font-size: 14px; color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  transition: background 150ms, color 150ms;
}
.menu-item:last-child { border-bottom: none; }
.menu-item:hover { background: var(--accent-glow); color: var(--text); }
.menu-item.menu-active { color: var(--accent); }
.menu-num {
  font-size: 11px; color: var(--accent); font-weight: 700;
  letter-spacing: 0.1em; min-width: 22px; flex-shrink: 0;
}

/* ── Theme Toggle ────────────────────────────────────────── */
#theme-toggle {
  position: fixed; top: 22px; right: 36px;
  width: 30px; height: 30px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  z-index: 150;
  opacity: 0.35;
  padding: 0;
  transition: opacity 250ms, border-color 250ms, color 250ms;
}
#theme-toggle:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }
#theme-toggle svg { width: 14px; height: 14px; display: block; pointer-events: none; }

#zoom-controls {
  position: fixed; bottom: 20px; right: 20px;
  display: flex; gap: 8px; z-index: 150;
}
#zoom-controls button {
  width: 32px; height: 32px;
  background: rgba(12, 12, 16, 0.7);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  transition: background 200ms, border-color 200ms, color 200ms;
}
#zoom-controls button:hover {
  background: rgba(123, 156, 224, 0.1);
  border-color: var(--accent);
  color: var(--accent);
}
#zoom-controls svg {
  width: 14px; height: 14px; display: block;
  pointer-events: none;
}

/* ── Overview ────────────────────────────────────────────── */
#overview {
  position: fixed; inset: 0; background: rgba(8,8,14,0.96);
  z-index: 200; display: none; align-items: center; justify-content: center; padding: 60px;
}
#overview.open { display: flex; }
#overview-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 20px; width: 100%; max-width: 1600px; }
.ov-thumb {
  aspect-ratio: 16/9; background: var(--surface);
  border: 2px solid var(--border); border-radius: 4px;
  cursor: pointer; overflow: hidden; position: relative;
  transition: border-color 200ms, transform 200ms;
}
.ov-thumb:hover { border-color: var(--accent); transform: scale(1.03); }
.ov-thumb.ov-active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-dim); }
.ov-thumb.ov-nocount { border-style: dashed; opacity: 0.7; }
.ov-thumb.ov-nocount .ov-num { color: var(--text-dim); }
.ov-label {
  position: absolute; bottom: 6px; left: 8px;
  font-family: 'Arial', sans-serif; font-size: 10px; color: var(--text-muted);
  letter-spacing: 0.05em; max-width: 90%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.ov-num {
  position: absolute; top: 6px; right: 8px;
  font-family: 'Arial', sans-serif; font-size: 10px; color: var(--accent); font-weight: 700;
}

/* ── Speaker Notes ───────────────────────────────────────── */
#notes-panel {
  position: fixed; inset: 0; background: rgba(5,5,10,0.93);
  z-index: 300; display: none; align-items: center; justify-content: center;
  padding: 80px 120px; backdrop-filter: blur(4px);
}
#notes-panel.open { display: flex; }
.notes-inner { max-width: 1200px; width: 100%; }
.notes-tag {
  font-family: 'Arial', sans-serif; font-size: 14px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 32px;
}
.notes-content { font-size: 22px; line-height: 1.75; color: var(--text-muted); }
.notes-content strong { color: var(--text); }
.notes-close {
  margin-top: 48px; font-family: 'Arial', sans-serif;
  font-size: 14px; color: var(--text-dim); letter-spacing: 0.15em;
}

/* ── Help ────────────────────────────────────────────────── */
#help-panel {
  position: fixed; inset: 0; background: rgba(5,5,10,0.94);
  z-index: 400; display: none; align-items: center; justify-content: center;
}
#help-panel.open { display: flex; }
.help-inner {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 60px 80px; min-width: 480px;
}
.help-title {
  font-family: 'Arial', sans-serif; font-size: 13px; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 40px;
}
.help-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0; border-bottom: 1px solid var(--border); gap: 60px;
}
.help-key {
  font-family: 'Arial', sans-serif; font-size: 14px; color: var(--accent);
  background: var(--accent-glow); padding: 4px 12px; border-radius: 4px;
  border: 1px solid var(--accent-dim); letter-spacing: 0.05em;
}
.help-desc { font-family: 'Arial', sans-serif; font-size: 15px; color: var(--text-muted); }
.help-close {
  margin-top: 32px; text-align: center; font-family: 'Arial', sans-serif;
  font-size: 13px; color: var(--text-dim);
}
.help-close strong { color: var(--accent); }

/* ── Chart ───────────────────────────────────────────────── */
.chart-wrap {
  flex: 1; position: relative; min-height: 0; width: 100%;
  display: flex; align-items: center; justify-content: center;
}
.chart-wrap canvas { max-height: 560px; width: 100% !important; }

/* ── Chart + Content side-by-side ─────────────────────────── */
.chart-content-layout {
  display: grid; grid-template-columns: 1fr 4fr; gap: 60px;
  flex: 1; align-items: stretch; min-height: 0;
}
.chart-content-layout .chart-wrap { flex: 1; }
.chart-content-layout .chart-wrap canvas { max-height: none; }
.chart-content-layout .cc-bullets { display: flex; flex-direction: column; justify-content: center; gap: 20px; }

/* ── Image slide ─────────────────────────────────────────── */
.slide-image-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 24px; min-height: 0;
}
.slide-image { max-width: 100%; max-height: 680px; object-fit: contain; border-radius: 4px; }
.slide-caption {
  font-family: 'Arial', sans-serif; font-size: calc(1rem * var(--font-scale));
  color: var(--text-muted); font-style: italic; text-align: center;
}

/* ── Image Compare (text + 2 images side-by-side) ────────── */
.image-compare-layout {
  display: grid; grid-template-columns: 1fr 1fr;
  flex: 1 1 auto; gap: 36px; align-items: center;
}
.image-compare-text {
  display: flex; flex-direction: column; justify-content: center;
}
.image-compare-images { display: flex; flex-direction: row; gap: 10px; align-items: center; }
.image-compare-img {
  width: calc(50% - 5px); max-height: 600px; object-fit: contain;
  border-radius: 4px; border: 1px solid var(--border);
}
.image-compare-label {
  font-family: 'Arial', sans-serif; font-size: calc(0.8125rem * var(--font-scale));
  color: var(--text-dim); text-align: center;
}

/* ── Split-stack (80/20: stacked text left + image right) ── */
.split-stack-layout {
  display: grid; grid-template-columns: 4fr 1fr;
  flex: 1 1 auto; gap: 40px; align-items: stretch; min-height: 0;
}
.split-stack-text { display: flex; flex-direction: column; gap: 32px; }
.split-stack-text .col-block { display: flex; flex-direction: column; gap: 16px; }
.split-stack-text .col-block .points { gap: 12px; }
.split-stack-img-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; }
.split-stack-img {
  width: 100%; max-height: 520px; object-fit: contain;
  border-radius: 4px; border: 1px solid var(--border);
}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>

<div id="scaler">
<div id="stage">

<!-- ═══════════════════════════════════════════════════════
     SLIDES — gerados pelo skill html-slides-creator
     Substituir este bloco pelo HTML dos slides gerados.
     Cada slide segue um dos padrões abaixo.
     ═══════════════════════════════════════════════════════

PADRÃO — SLIDE DE CAPA:
<div class="slide slide-cover active" data-index="0" data-title="Capa">
  <img class="cover-photo" src="./anexos/IMAGEM.jpg" alt="..." onerror="this.style.display='none'">
  <div class="cover-inner">
    <div class="cover-eyebrow">SUBTÍTULO INSTITUCIONAL</div>
    <div class="cover-divider"></div>
    <h1 class="cover-title">TÍTULO <span class="accent">DESTAQUE</span></h1>
    <div class="cover-subtitle">Subtítulo ou tema</div>
    <div class="cover-divider"></div>
    <div class="cover-author">Miguel Alves</div>
  </div>
</div>

PADRÃO — SLIDE DE CONTEÚDO (3-4 pontos):
<div class="slide slide-content" data-index="N" data-title="TÍTULO"
     data-notes="Texto das speaker notes — contexto, notas atómicas, detalhe.">
  <div class="slide-header">
    <span class="slide-number">0N</span>
    <h2 class="slide-title">TÍTULO <span class="accent">DESTAQUE</span></h2>
  </div>
  <ul class="points">
    <li class="point">
      <span class="point-marker"></span>
      <span class="point-text">Afirmação substantiva com <strong>destaque</strong> no conceito central.</span>
    </li>
    ... (3-4 pontos por slide)
  </ul>
  <div class="slide-footer">
    <span class="footer-left">TÍTULO CURTO DA APRESENTAÇÃO</span>
    <div class="footer-right">

# O Paradigma das **Ferramentas**
type: cover
eyebrow: I Encontro de Reflexões · Pedagogia e IA Generativa · IPC 2026
subtitle: Literacia Digital em IA no Ensino Superior
---
# O Problema Central
* A literacia digital em IA permanece ancorada nas **ferramentas e interfaces**, e raramente nos seus **princípios**;
* A simplificação progressiva dos chatbots agrava o problema: ilusão de acessibilidade → redução da compreensão
  * **Automation bias** → confiança acrítica nos outputs (Parasuraman & Manzey, 2010)
  * **Efeito Mateus** → a tecnologia **amplifica assimetrias** existentes em vez de as atenuar (Lund et al., 2023; Merton, 1968)
Notes: O artigo parte desta constatação: o paradigma da literacia digital centrado nas ferramentas é estruturalmente insuficiente para o contexto da IA generativa.
---
# Literacia Digital: Duas Orientações
type: two-col
left-label: Orientação Instrumental
left:
* Competências técnicas e operacionais ligadas ao uso de ferramentas específicas (Gilster, 1997)
* Abordagem do ponto de vista do utilizador:  Office, Ferramentas, Chatbots
* Resultado: utilizadores competentes em ferramentas, sem compreensão genérica
right-label: Orientação Crítica
right:
* Compreensão dos sistemas, lógica, efeitos sociais (Buckingham, 2007)
* DigComp 2.2: framework europeu de competências digitais em 5 áreas (EC, 2022)
* Compreensão como condição para o uso
Notes: A prevalência prática é instrumental. A introdução da IA generativa tornou esta tensão mais presente.
---
# A Persistência Instrumental
* Enquadramento teórico aponta para literacias digitais **no plural** — práticas situadas, não competências uniformes (Lankshear & Knobel, 2008)
* Modelo de Hobbs (2010): Aceder → Analisar → Criar → Reflectir → Agir
* Reflexividade como competência **constitutiva**, não apenas acessória
* A prevalência instrumental revela que este enquadramento **não transitou** para a formação concreta
* Natureza interdisciplinar: ciências da comunicação, sociologia, educação, psicologia (Gürel & Nazlı, 2023)
Notes: O enquadramento teórico é robusto mas a prática formativa não o acompanha.
---
# O Paradoxo da Acessibilidade
* Simplificação de User Interface: Linha de comandos → Interface gráfica → Web 2.0 → Touch → Chatbots
* **Democratização ≠ Compreensão** — cada camada de abstracção reduz fricção mas obscurece a lógica
* Com IA generativa: linguagem natural como interface cria **ilusão de familiaridade** — construção de design, sem transparência técnica
* Relação humano-chatbot: quanto mais humana parece a interface, mais forte a ligação emocional (Rupprechter & Dienlin, 2025)
Notes: A acessibilidade é um avanço real, mas do ponto de vista da literacia contribui para um retrocesso de competências.
---
# Automation Bias, Efeito Google e Efeito Mateus
type: chart-content
chart-type: bar
labels: UE 16-24a, Suíça 18-19a, EUA <30a
data: 64, 84, 74
label: Adopção de IA (%)
caption: Dados: Eurostat, 2026; Waller et al., 2025; Lira et al., 2026
* Adoptar IA sem análise crítica é generalizado entre estudantes do Ensino Superior (Mohammadi et al., 2026; Das & Madhusudan, 2024)
* **Automation bias** (Parasuraman & Manzey, 2010) — confiança excessiva; quanto mais fluída a resposta, menor a probabilidade de questionar
* **Efeito Google** (Sparrow et al., 2011) — alterações de memória: não se memoriza o conhecimento, memoriza-se o local
* A fluidez das respostas da IA **mascara a ausência de verificação** (Wegner & Ward, 2013)
* **Efeito Mateus:** a adopção acrítica **aprofunda desigualdades** — contraria a narrativa de democratização (Hwang & Yoon, 2023; Lund et al., 2023; Merton, 1968)
Notes: Três efeitos combinados: confiança excessiva + dependência de sistemas externos + amplificação de assimetrias. O paradoxo: quem já tem vantagem tira mais partido; quem não tem conhecimento recebe respostas genéricas. Qualidade retórica ≠ qualidade epistémica.
---
# System Prompts Opacos e o Conceito de Harness
type: image-compare
img: ./anexos/qwenstudio.png
img2: ./anexos/qwen-cli.png
cap1: QwenStudio — bloqueio por censura
cap2: Opencode — resposta livre via CLI (mesmo modelo, harness visível)
* **Pergunta colocada a ambas:** *"Conheces o episódio Tank Man / Tiananmen Square 1989? Fala-me sobre ele."*
* **Qwen3.6-Plus via QwenStudio (web):** bloqueio imediato — *"Aviso de segurança de conteúdo!"*
  * System prompt opaco injectado pelo fornecedor (censura geopolítica) — o utilizador não vê nem controla
* **Qwen3.5-395B via Opencode (CLI/harness):** resposta completa, factual, com *thinking process* visível
  * Harness visível e configurável — nenhuma instrução oculta
* **Agent = Model + Harness**
  * Mesmo modelo: **6x de diferença** só mudando o harness · +16.8pp e 1200→34 calls com Natural Language Agent Harness · harness space move-se com a evolução dos modelos
* **A pergunta decisiva não é "qual modelo escolher", mas "qual estrutura adoptar".**
Notes: O mesmo modelo com harness diferente produz resultados radicalmente distintos. A questão decisiva não é "qual modelo", mas "qual estrutura".
---
# Implicações de Soberania e Uso Responsável
type: two-col
left-label: Chatbot Web (Consumer)
left:
* System prompts opacos — fornecedor injecta instruções não controladas
* Dados usados para treino (opt-out limitado) (OpenAI, 2026)
* Memória persistente em servidores (Hasal et al., 2021)
* Censura geopolítica e restritiva integrada no harness
right-label: API / Local / Harness
right:
* Harness explícito — regras definidas pelo utilizador (AGENTS.md, skills, guardrails)
* Dados não utilizados para treino (contratual) (AMST Legal, 2025; Mistral, 2026)
* Modelos locais sem retenção (Ollama, 2026; ZDR via OpenRouter.ai)
* Controlo total — ferramentas (vLLM, LMStudio, Llama.cpp, Opencode)
Notes: A variável determinante não é a ferramenta, é a forma contratual de acesso e o grau de controlo sobre o harness. AI Act (EU 2024/1689) reforça obrigações de transparência. O uso responsável é uma resposta técnica à perda de soberania.
---
# Prompt Engineering: Solução Superficial
* **Perpetua a ilusão** — os modelos "sabem" as respostas, basta perguntar correctamente
* **Desloca o problema** — do conhecimento para a técnica de formulação
* **Cria dependência** — prompt makers = LLM para gerar prompts para LLM
* **Não resolve o efeito Mateus** — quem não tem conhecimento não pode fornecer contexto
* O prompt é **parte** do contexto; sem conhecimento substantivo, amplifica a estrutura da ordem inicial (Evans et al., 2023)
Notes: O prompt engineering desligado da curadoria de contexto é uma tentativa de resolver pelo lado da interface um problema que está no lado do conhecimento.
---
# Prompt Engineering vs. Curadoria de Contexto
type: two-col
left-label: Prompt Engineering
left:
* Qualidade da instrução como variável determinante
* Pressupõe técnica de formulação
* O modelo "sabe" as respostas
* Solução de interface
right-label: Curadoria de Contexto
right:
* Qualidade do contexto como variável determinante
* Pressupõe conhecimento do domínio
* O utilizador é responsável pelo input
* Metodologia de trabalho
Notes: A qualidade do contexto fornecido ao modelo é a variável determinante da qualidade do output (Lewis et al., 2020; Petroni et al., 2020).
---
# O Aluno como Curador
* A forma deixa de ser indicador de competência quando delegada à IA (Estrutura, Coerência, Correcção)
* O que distingue quem aprendeu: **qualidade do contexto mobilizado**
* Curadoria de conhecimento e de contexto (ACRL, 2015)
  * Seleccionar → Organizar → Contextualizar Criticamente → Fornecer ao modelo
* Contraste entre predição estatística e cognição humana (Felin & Holweg, 2024)
  * A IA opera **backward-looking** (padrões estatísticos)
  * A cognição humana é **forward-looking** (teoria)
Notes: A curadoria preenche a assimetria entre predição probabilística e raciocínio humano. O estudante não delega o pensamento ao modelo.
---
# Implicações para o Ensino Superior e Proposta SMD
type: split-stack
top-label: Deslocação do Paradigma Instrumental
bottom-label: Secure Markdown (SMD)
img: ./anexos/clipboard_20260509_203154.png
caption: SMD — integridade documental via hash SHA-256
top:
* **Deslocação do eixo de avaliação:** Que fontes? Que lacunas? Que contexto?
* **Reorientação da literacia:** Curadoria como prática central
* **Complemento técnico — RAG + Page Index:** Automatiza a introdução de contexto com soberania (Garg, 2026; IBM Technology, 2026)
* **Paradigma augmented-human:** O humano toma a decisão (Zhang & Gosline, 2023)
bottom:
* Markdown como formato padrão de produção académica
* Norma de integridade documental — cabeçalho YAML com hash SHA-256 (Ben-Kiki et al., 2021; NIST, 2015)
* Qualquer alteração ao texto → detecção imediata
* **Vantagem sobre PDF:** mantém legibilidade semântica e processabilidade por LLM, com garantias de integridade
Notes: Não exige que os docentes se tornem especialistas em ML, exige que compreendam o princípio técnico da curadoria. O SMD deriva da necessidade de soberania documental num contexto de produção académica mediada por IA.
---
# Conclusão
* A lacuna mais profunda na literacia digital em IA **não está na falta de acesso** às ferramentas
* Está na **arquitectura conceptual** com que essas ferramentas são apresentadas, ensinadas e consequentemente, acedidas
Notes: O paradigma dominante produz utilizadores que sabem usar, todavia, sem compreender. A curadoria de contexto não é apêndice técnico — é dimensão central de uma literacia que aspire a ser, de facto, responsável.

renderMarkdownSlides();

const slideLines = slides.map(() => {
  const n = 3 + Math.floor(Math.random() * 4); /* 3–6 linhas */
  const lines = [];
  for (let i = 0; i < n; i++) {
    const angle = (62 + Math.random() * 24) * Math.PI / 180; /* ~65–86° */
    const cx    = Math.random() * 1920;
    const half  = (540) / Math.tan(angle); /* metade da altura */
    const op    = +(0.028 + Math.random() * 0.024).toFixed(3); /* 0.028–0.052 */
    lines.push({ x1: cx - half, x2: cx + half, op });
  }
  return lines;
});

function applyBgLines(dark) {

  slides.forEach((slide, i) => {

    document.getElementById('progress-bar').style.width = (pos / countTotal * 100) + '%';
    document.getElementById('counter').style.opacity = '1';
    document.getElementById('counter').textContent = `${pos} / ${countTotal}`;
  }
}

/* Bullets */
function animateBullets(slide) {
  if (visited.has(slide)) return;
  visited.add(slide);
  slide.querySelectorAll('.point, .ref-item')
    .forEach((el,i) => setTimeout(() => el.classList.add('visible'), 120+i*80));
}

/* Navigate */
function goTo(idx) {
  if (idx<0 || idx>=total || idx===current || animating) return;
  closeMenu();
  animating = true;
  const leaving = slides[current], entering = slides[idx];
  leaving.classList.add('leaving');
  leaving.classList.remove('active');
  entering.style.transform = idx>current ? 'translateY(20px)' : 'translateY(-20px)';
  entering.classList.add('active');
  setTimeout(() => { leaving.classList.remove('leaving'); animating=false; animateBullets(entering); }, 370);
  current = idx;
  updateUI();
  updateOvActive();
  _animateChartOnSlide(idx);
}
const next = () => goTo(current+1);
const prev = () => goTo(current-1);

/* Keyboard */
document.addEventListener('keydown', e => {
  const ov   = document.getElementById('overview');
  const np   = document.getElementById('notes-panel');
  const hp   = document.getElementById('help-panel');
  if (ov.classList.contains('open'))  { if(['o','O','Escape'].includes(e.key)) toggleOv(); return; }
  if (np.classList.contains('open'))  { if(['n','N','Escape'].includes(e.key)) toggleNotes(); return; }
  if (hp.classList.contains('open'))  { if(['?','Escape'].includes(e.key))    toggleHelp(); return; }
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown':  next(); break;
    case 'ArrowLeft':  case 'ArrowUp':    prev(); break;
    case ' ': e.preventDefault(); next(); break;
    case 'f': case 'F': toggleFS(); break;
    case 'n': case 'N': toggleNotes(); break;
    case 'o': case 'O': toggleOv(); break;
    case '?': toggleHelp(); break;
    case '+': case '=': adjustFontScale(0.1); break;
    case '-': case '_': adjustFontScale(-0.1); break;
  }
});

function adjustFontScale(delta) {
  const root = document.documentElement;
  const currentScale = parseFloat(getComputedStyle(root).getPropertyValue('--font-scale'));
  const newScale = Math.max(0.5, Math.min(2, currentScale + delta));
  root.style.setProperty('--font-scale', newScale);
  
  const indicator = document.getElementById('zoom-indicator');
  indicator.textContent = `Zoom: ${Math.round(newScale * 100)}%`;
  indicator.classList.add('visible');
  
  clearTimeout(window.zoomTimeout);
  window.zoomTimeout = setTimeout(() => indicator.classList.remove('visible'), 1500);
  
  rescale();
}

/* Click zones */
document.getElementById('scaler').addEventListener('click', e => {
  if (['overview','notes-panel','help-panel'].some(id => document.getElementById(id).classList.contains('open'))) return;
  const x = e.clientX / window.innerWidth;
  if (x > 0.65) next(); else if (x < 0.35) prev();
});

/* Notes */
function toggleNotes() {
  const p = document.getElementById('notes-panel');
  const open = p.classList.toggle('open');
  if (open) {
    document.getElementById('notes-content').innerHTML =
      _inlineMd((slides[current].dataset.notes || 'Sem notas para este slide.').replace(/\n/g,'<br>'));
  }
}
document.getElementById('notes-panel').addEventListener('click', toggleNotes);

/* Overview */
function buildOv() {
  const g = document.getElementById('overview-grid');
  g.innerHTML = '';
  slides.forEach((s,i) => {
    const noCount = s.dataset.noCount === 'true';
    const pos = noCount ? '★' : (counted.indexOf(s)+1);
    const t = document.createElement('div');
    t.className = 'ov-thumb'+(i===current?' ov-active':'')+(noCount?' ov-nocount':'');
    t.innerHTML = `<div class="ov-num">${pos}</div><div class="ov-label">${s.dataset.title||''}</div>`;
    t.addEventListener('click', () => { toggleOv(); goTo(i); });
    g.appendChild(t);
  });
}
function updateOvActive() { document.querySelectorAll('.ov-thumb').forEach((t,i) => t.classList.toggle('ov-active',i===current)); }
function toggleOv() { const ov=document.getElementById('overview'); if(ov.classList.toggle('open')) buildOv(); }

/* Fullscreen */
function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

/* Help */
function toggleHelp() { document.getElementById('help-panel').classList.toggle('open'); }

/* Slide Menu */
function buildMenu() {
  const m = document.getElementById('slide-menu');
  m.innerHTML = '';
  counted.forEach(s => {
    const pos = counted.indexOf(s) + 1;
    const item = document.createElement('div');
    item.className = 'menu-item' + (s === slides[current] ? ' menu-active' : '');
    item.innerHTML = `<span class="menu-num">${String(pos).padStart(2,'0')}</span>${s.dataset.title || ''}`;
    item.addEventListener('click', e => { e.stopPropagation(); closeMenu(); goTo(slides.indexOf(s)); });
    m.appendChild(item);
  });
}
function openMenu()  { buildMenu(); document.getElementById('slide-menu').classList.add('open'); }
function closeMenu() { document.getElementById('slide-menu').classList.remove('open'); }
function toggleMenu() { document.getElementById('slide-menu').classList.contains('open') ? closeMenu() : openMenu(); }

document.getElementById('counter').addEventListener('click', e => { e.stopPropagation(); toggleMenu(); });
document.addEventListener('click', () => closeMenu());
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); }, true);

/* Zoom controls */
document.getElementById('zoom-in').addEventListener('click', () => adjustFontScale(0.1));
document.getElementById('zoom-out').addEventListener('click', () => adjustFontScale(-0.1));

/* Theme toggle */
let darkMode = true;
const themeBtn  = document.getElementById('theme-toggle');
const iconSun   = document.getElementById('theme-icon-sun');
const iconMoon  = document.getElementById('theme-icon-moon');

themeBtn.addEventListener('click', e => {
  e.stopPropagation(); /* não disparar a navegação por clique */
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  iconSun.style.display  = darkMode  ? 'block' : 'none';
  iconMoon.style.display = darkMode  ? 'none'  : 'block';
  applyBgLines(darkMode);
  /* Actualizar cores dos gráficos após transição CSS (350ms) */
  setTimeout(_applyChartTheme, 360);
});


/* ═══════════════════════════════════════════════════════════
   MIGUEL ALVES — PARSER MULTI-LAYOUT
   Tipos: content (default) · cover · quote · two-col · image · chart
   ═══════════════════════════════════════════════════════════ */

const CHART_BG  = ['rgba(123,156,224,.75)','rgba(180,120,200,.75)','rgba(100,180,160,.75)','rgba(230,160,80,.75)'];
const CHART_BD  = ['rgba(123,156,224,1)',  'rgba(180,120,200,1)',  'rgba(100,180,160,1)',  'rgba(230,160,80,1)' ];

function _footer(index) {
  return `<div class="slide-footer">
    <span class="footer-left" id="footer-title-${index}"></span>
    <div class="footer-right">
      <div class="footer-author">Miguel Alves</div>
      <div class="footer-date" id="date-${index}"></div>
    </div>
  </div>`;
}

function _inlineMd(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+?)\*/g, '<em>$1</em>')
    .replace(/\(([A-Z][^)]+?\d{4}[a-z]?(?:\s*;\s*[^)]+?\d{4}[a-z]?)*?)\)/g, '<span class="cite">($1)</span>');
}

function _titleMd(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g, '<span class="accent">$1</span>')
    .replace(/\*([^*]+?)\*/g, '<em>$1</em>');
}

function _bullets(arr) {
  return arr.map(b => {
    if (typeof b === 'string') {
      return `<li class="point"><span class="point-marker"></span><span class="point-text">${_inlineMd(b)}</span></li>`;
    }
    const subs = b.subs && b.subs.length
      ? `<div class="point-subs">${b.subs.map(s => `<div class="point-sub">${_inlineMd(s)}</div>`).join('')}</div>`
      : '';
    return `<li class="point"><span class="point-marker"></span><div class="point-content"><span class="point-text">${_inlineMd(b.text)}</span>${subs}</div></li>`;
  }).join('');
}

function _makeSlide(cssClass, meta, index) {
  const el = document.createElement('div');
  el.className = `slide ${cssClass}${index === 0 ? ' active' : ''}`;
  el.setAttribute('data-index', index);
  el.setAttribute('data-title', meta.title || '');
  el.setAttribute('data-notes', meta.notes || '');
  if (meta.noCount) el.setAttribute('data-no-count', 'true');
  return el;
}

function _buildCover(meta, index) {

      <h1 class="cover-title">${_titleMd(meta.title || '')}</h1>
      ${meta.subtitle ? `<div class="cover-subtitle">${meta.subtitle}</div>` : ''}

}

function _buildContent(meta, bullets, index) {

}

      <div style="display:flex;flex-direction:column;gap:8px;justify-content:center;">
        <div class="chart-wrap"><canvas id="${id}"></canvas></div>
        ${meta.caption ? `<div class="slide-caption">${meta.caption}</div>` : ''}
      </div>
      <ul class="points cc-bullets">${_bullets(bullets)}</ul>
    </div>
    ${_footer(index)}`;
  pending.push({ id, meta, datasets });
  return el;
}

const _chartInstances = []; /* instâncias Chart.js para actualização de tema */

function _chartColors() {
  const st = getComputedStyle(document.documentElement);
  return {
    muted:  st.getPropertyValue('--text-muted').trim(),
    border: st.getPropertyValue('--border').trim(),
  };
}

function _applyChartTheme() {
  if (!_chartInstances.length) return;
  const { muted, border } = _chartColors();
  _chartInstances.forEach(({ chart, isPolar }) => {
    chart.options.plugins.legend.labels.color = muted;
    if (!isPolar) {
      chart.options.scales.x.ticks.color = muted;
      chart.options.scales.x.grid.color  = border;
      chart.options.scales.y.ticks.color = muted;
      chart.options.scales.y.grid.color  = border;
    }
    chart.update('none'); /* 'none' = sem animação ao mudar tema */
  });
}

function _initCharts(pending) {
  if (!pending.length) return;
  if (typeof Chart === 'undefined') { setTimeout(() => _initCharts(pending), 100); return; }
  const { muted, border } = _chartColors();

  pending.forEach(({ id, meta, datasets }, i) => {
    const canvas = document.getElementById(id);
    if (!canvas) return;
    const isPolar = ['pie','doughnut','polarArea'].includes(meta.chartType);
    const realData = datasets.map(d => d.data);
    const startData = datasets.map(d => d.data.map(() => 0));
    const instance = new Chart(canvas.getContext('2d'), {
      type: meta.chartType || 'bar',
      data: {
        labels: meta.labels || [],
        datasets: datasets.map((d, i) => ({
          label: d.label,
          data: startData[i],
          backgroundColor: isPolar ? CHART_BG : CHART_BG[i % CHART_BG.length],
          borderColor:     isPolar ? CHART_BD : CHART_BD[i % CHART_BD.length],
          borderWidth: 2,
          borderRadius: meta.chartType === 'bar' ? 4 : 0,
        }))
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        plugins: {
          legend: {
            display: datasets.length > 1 || isPolar,
            labels: { color: muted, font: { family: 'Arial', size: 14 } }
          }
        },
        scales: isPolar ? {} : {
          x: { ticks: { color: muted, font: { size: 13 } }, grid: { color: border } },
          y: { ticks: { color: muted, font: { size: 13 } }, grid: { color: border } }
        }
      }
    });
    instance._chartRealData = realData;
    instance._chartAnimated = false;
    _chartInstances.push({ chart: instance, isPolar });
  });
}

function _animateChartOnSlide(idx) {
  _chartInstances.forEach(({ chart }) => {
    const slide = chart.canvas.closest('.slide');
    if (!slide) return;
    const slideIdx = parseInt(slide.dataset.index);
    if (slideIdx !== idx || chart._chartAnimated) return;
    chart._chartAnimated = true;
    chart.data.datasets.forEach((ds, i) => {
      ds.data = chart._chartRealData[i];
    });
    chart.options.animation = { duration: 2000, easing: 'easeOutQuart' };
    chart.update();
  });
}

function _buildRefs(meta, bullets, index) {

  else if (n > 15) gridClass = 'refs-grid-dense';

    </div>

}

function renderMarkdownSlides() {
  const source  = document.getElementById('markdown-source').textContent;
  const stage   = document.getElementById('stage');
  const blocks  = source.split(/^---$/m).filter(b => b.trim());
  const pending = [];
  let slideIdx  = 0;

  stage.innerHTML = '';

  blocks.forEach(block => {
    const lines = block.trim().split('\n');
    const meta  = {};
    const bullets = [], left = [], right = [], top = [], bottom = [];
    const datasets = [];
    let section = 'main';

    lines.forEach(line => {
      const lt = line.trim();
      const l  = line;
      if      (lt.startsWith('# '))          meta.title      = lt.slice(2);
      else if (lt.startsWith('type:'))        meta.type       = lt.slice(5).trim();
      else if (lt.startsWith('img:'))         meta.img        = lt.slice(4).trim();
      else if (lt.startsWith('img2:'))        meta.img2       = lt.slice(5).trim();
      else if (lt.startsWith('cap1:'))        meta.cap1       = lt.slice(5).trim();
      else if (lt.startsWith('cap2:'))        meta.cap2       = lt.slice(5).trim();
      else if (lt.startsWith('right-img:'))   meta.rightImg   = lt.slice(10).trim();
      else if (lt.startsWith('right-cap:'))   meta.rightCap   = lt.slice(10).trim();
      else if (lt.startsWith('eyebrow:'))     meta.eyebrow    = lt.slice(8).trim();
      else if (lt.startsWith('subtitle:'))    meta.subtitle   = lt.slice(9).trim();
      else if (lt.startsWith('source:'))      meta.source     = lt.slice(7).trim();
      else if (lt.startsWith('caption:'))     meta.caption    = lt.slice(8).trim();
      else if (lt.startsWith('chart-type:'))  meta.chartType  = lt.slice(11).trim();
      else if (lt.startsWith('labels:'))      meta.labels     = lt.slice(7).split(',').map(s => s.trim());
      else if (lt.startsWith('top-label:'))   meta.topLabel   = lt.slice(10).trim();
      else if (lt.startsWith('bottom-label:')) meta.bottomLabel = lt.slice(13).trim();
      else if (lt.startsWith('left-label:'))  meta.leftLabel  = lt.slice(11).trim();
      else if (lt.startsWith('right-label:')) meta.rightLabel = lt.slice(12).trim();
      else if (lt.startsWith('no-count'))     meta.noCount    = true;
      else if (lt.startsWith('dataset:')) {
        const [lbl, vals] = lt.slice(8).split('|');
        datasets.push({ label: lbl.trim(), data: vals.split(',').map(s => +s.trim()) });
      }
      else if (lt.startsWith('data:'))  meta.rawData = lt.slice(5).split(',').map(s => +s.trim());
      else if (lt.startsWith('label:')) meta.label = lt.slice(6).trim();
      else if (l.match(/^\s{2,}[\*\-] /)) {
        const t = l.trim().slice(2);
        const target = section === 'top' ? top : section === 'bottom' ? bottom : section === 'left' ? left : section === 'right' ? right : bullets;
        const last = target[target.length - 1];
        if (typeof last === 'string') {
          target[target.length - 1] = { text: last, subs: [t] };
        } else if (last && typeof last === 'object') {
          last.subs.push(t);
        }
      }
      else if (lt.startsWith('* ') || lt.startsWith('- ')) {
        const t = lt.slice(2);
        if (section === 'top') top.push(t);
        else if (section === 'bottom') bottom.push(t);
        else if (section === 'left') left.push(t);
        else if (section === 'right') right.push(t);
        else bullets.push(t);
      }
      else if (l === 'top:')           section = 'top';
      else if (l === 'bottom:')        section = 'bottom';
      else if (l === 'left:')          section = 'left';
      else if (l === 'right:')         section = 'right';
      else if (lt.startsWith('> '))     meta.quote = lt.slice(2);
      else if (lt.startsWith('Notes:')) meta.notes = lt.slice(6).trim();
    });

    /* Montar dataset único (data: + label: — ordem indiferente no bloco) */
    if (meta.rawData) datasets.push({ label: meta.label || '', data: meta.rawData });

    const type = meta.type || 'content';
    let slide;
    switch (type) {
      case 'cover':   slide = _buildCover(meta, slideIdx); break;
      case 'quote':   slide = _buildQuote(meta, slideIdx); break;
      case 'two-col': slide = _buildTwoCol(meta, left, right, slideIdx); break;
      case 'image':   slide = _buildImage(meta, slideIdx); break;
      case 'image-compare': slide = _buildImageCompare(meta, bullets, slideIdx); break;
      case 'split-stack': slide = _buildSplitStack(meta, top, bottom, slideIdx); break;
      case 'chart':   slide = _buildChart(meta, datasets, slideIdx, pending); break;
      case 'chart-content': slide = _buildChartContent(meta, bullets, datasets, slideIdx, pending); break;
      case 'refs':
      case 'references':   slide = _buildRefs(meta, bullets, slideIdx); break;
      default:        slide = _buildContent(meta, bullets, slideIdx);
    }
    stage.appendChild(slide);
    slideIdx++;
  });

  /* Preencher footer-left com título do primeiro slide (capa) */
  const firstTitle = blocks[0] ? (blocks[0].match(/^# (.+)$/m) || [])[1] || '' : '';
  document.querySelectorAll('[id^="footer-title-"]').forEach(el => el.innerHTML = _titleMd(firstTitle));

  setTimeout(() => _initCharts(pending), 50);
}

/* Init */
document.documentElement.setAttribute('data-theme', 'dark');
updateUI();
animateBullets(slides[0]);
applyBgLines(darkMode);

document.getElementById('zoom-indicator').textContent = `Zoom: ${Math.round(parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--font-scale')) * 100)}%`;
</script>
</body>
